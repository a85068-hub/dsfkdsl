        // --- 2. 輔助函式庫 ---
        const getSeatId = (r, c) => `r${r}c${c}`;
        const parseSeatId = (id) => { const match = id.match(/r(\d+)c(\d+)/); return match ? { r: parseInt(match[1]), c: parseInt(match[2]) } : null; };
        
        const isStrictAdjacent = (id1, id2) => {
            const s1 = parseSeatId(id1); const s2 = parseSeatId(id2);
            if (!s1 || !s2) return false;
            if (s1.r === s2.r && Math.abs(s1.c - s2.c) === 1) return true;
            if (s1.c === s2.c && Math.abs(s1.r - s2.r) === 1) return true;
            return false;
        };
        
        const isGroupAdjacent = (id1, id2) => {
            const s1 = parseSeatId(id1); const s2 = parseSeatId(id2);
            if (!s1 || !s2) return false;
            return Math.abs(s1.r - s2.r) <= 1 && Math.abs(s1.c - s2.c) <= 1;
        };
        
        const shuffleArray = (array) => {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        };

        // --- 3. 登入畫面 (Step 0) ---
        const LoginScreen = ({ onLoginSuccess }) => {
            const [teacherId, setTeacherId] = useState('');
            const [pin, setPin] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [rememberMe, setRememberMe] = useState(true);

            useEffect(() => {
                const savedId = localStorage.getItem('yk_seating_id');
                const savedPin = localStorage.getItem('yk_seating_pin');
                if (savedId && savedPin) { setTeacherId(savedId); setPin(savedPin); setRememberMe(true); }
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!teacherId || !pin) { setErrorMsg('請填寫帳號與密碼'); return; }
                setIsLoading(true); setErrorMsg('');
                try {
                    const res = await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'login', teacherId, pin }) 
                    });
                    const data = await res.json();
                    
                    if (data.valid) {
                        if (rememberMe) {
                            localStorage.setItem('yk_seating_id', teacherId);
                            localStorage.setItem('yk_seating_pin', pin);
                        } else {
                            localStorage.removeItem('yk_seating_id'); localStorage.removeItem('yk_seating_pin');
                        }
                        onLoginSuccess({ id: teacherId, pin: pin, name: data.name });
                    } else {
                        setErrorMsg(data.error || '登入失敗，請檢查代碼與密碼');
                    }
                } catch (err) { 
                    setErrorMsg('網路連線異常，請確認網址是否正確且已發布新版 GAS'); 
                } finally { setIsLoading(false); }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-12 rounded-3xl shadow-xl border border-slate-200 max-w-md w-full animate-[fadeIn_0.5s_ease-out]">
                        <div className="w-20 h-20 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm">
                            <Icon name="users" className="text-indigo-600" size={40} />
                        </div>
                        <h1 className="text-2xl md:text-3xl font-extrabold text-center text-slate-800 mb-2 tracking-tight">智慧教室座位安排</h1>
                        <p className="text-center text-slate-500 mb-8 font-medium">請輸入教師專屬憑證進入系統</p>
                        
                        <form onSubmit={handleLogin} className="space-y-5">

                                    <input type="text" value={teacherId} onChange={e => setTeacherId(e.target.value)} className="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all font-semibold text-base" placeholder="例如：T01" required />

                            </div>
                            <div>

                            </div>
                            <button onClick={onGenerateLocked} disabled={isGenerating} className="flex-1 md:flex-none justify-center px-4 py-3 md:py-2 bg-indigo-50 border border-indigo-200 text-indigo-700 hover:bg-indigo-100 rounded-lg shadow-sm transition text-sm md:text-sm font-bold flex items-center gap-2 disabled:opacity-50">

                                >

        // --- 7. 網格繪製元件 ---
        const SeatingGrid = ({ rows, cols, frontRowsCount, unavailableSeats, mode, onSeatClick, fixedAssignments = {}, seatingChart = {}, seatViolationsMap = {}, lockedSeats = new Set(), onToggleLock, studentNumbers = {}, isPrintMode = false, onDragStart, onDragOver, onDrop }) => {
            const gridStyle = { display: 'grid', gridTemplateColumns: `repeat(${cols}, minmax(${isPrintMode ? '90px' : '65px'}, 1fr))`, gap: isPrintMode ? '0px' : '0.5rem', maxWidth: '100%' };
            const Podium = () => (
                <div className={`col-span-full flex justify-center ${isPrintMode ? 'mb-12 mt-4' : 'mb-8'}`}>
                <div className={`${isPrintMode ? 'border-2 border-black text-black px-24 py-4 rounded-lg bg-white text-xl font-black' : 'bg-slate-800 text-white px-16 md:px-24 py-2.5 rounded-b-2xl shadow-lg text-sm md:text-base font-bold tracking-[0.5em]'} uppercase`}>講 台</div>
                </div>
            );

            const getFixedStudentForSeat = (seatId) => {
                for (const [student, id] of Object.entries(fixedAssignments)) { if (id === seatId) return student; }
                return null;
            }

            const seats = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const seatId = getSeatId(r, c);
                    const isUnavailable = unavailableSeats.has(seatId);
                    const isFrontRow = r < frontRowsCount;
                    
                    let studentName = null;
                    if (mode === 'view') studentName = seatingChart[seatId];
                    else studentName = getFixedStudentForSeat(seatId);

                    const violations = seatViolationsMap[seatId] || [];
                    const hasViolation = violations.length > 0 && mode === 'view';
                    const isLocked = lockedSeats.has(seatId);

                    let seatClasses = `flex flex-col items-center justify-center p-1 md:p-2 text-center relative group w-full h-full prevent-select `;
                    let clickHandler = () => {};
                    let draggable = false;

                    if (isPrintMode) {
                        seatClasses += `border-2 border-slate-900 bg-white min-h-[80px] md:min-h-[90px] ${isUnavailable ? 'bg-slate-200' : ''} `;
                    } else {
                        seatClasses += `aspect-[4/3] rounded-xl transition-all duration-300 border-b-[3px] md:border-b-4 border-2 `;
                        
                        if (hasViolation) {
                            seatClasses += 'border-rose-500 border-b-rose-600 bg-rose-50 shadow-[0_0_15px_rgba(225,29,72,0.4)] z-10 animate-pulse ';
                        } else if (mode === 'config') {
                            seatClasses += isUnavailable ? "bg-slate-300 border-slate-400 border-b-slate-500 text-slate-500 cursor-pointer" : (isFrontRow ? "bg-amber-50 border-amber-300 border-b-amber-400 hover:bg-amber-100 cursor-pointer shadow-sm" : "bg-white border-slate-300 border-b-slate-400 hover:bg-slate-50 cursor-pointer shadow-sm");
                            clickHandler = () => onSeatClick(r, c);
                        } else if (mode === 'select-fixed') {
                            if (isUnavailable) seatClasses += "bg-slate-200 border-slate-300 cursor-not-allowed opacity-50";
                            else if (studentName) seatClasses += "bg-indigo-100 border-indigo-300 border-b-indigo-400 cursor-not-allowed opacity-90"; 
                            else {
                                seatClasses += isFrontRow ? "bg-amber-50 border-amber-300 border-b-amber-400 hover:bg-indigo-50 hover:border-indigo-400 hover:border-b-indigo-500 cursor-pointer shadow-sm" : "bg-white border-slate-300 border-b-slate-400 hover:bg-indigo-50 hover:border-indigo-400 hover:border-b-indigo-500 cursor-pointer shadow-sm";
                                clickHandler = () => onSeatClick(seatId);
                            }
                        } else if (mode === 'view') {
                            if (isUnavailable) seatClasses += "bg-slate-200/50 border-slate-300 border-b-0 opacity-40";
                            else if (studentName) {
                                if (!hasViolation) seatClasses += isFrontRow ? "bg-amber-50/80 border-amber-300 border-b-amber-400 shadow-md hover:shadow-lg backdrop-blur-sm " : "bg-white border-slate-300 border-b-slate-400 shadow-md hover:shadow-lg ";
                                if (!isLocked) { draggable = true; seatClasses += "cursor-grab active:cursor-grabbing hover:-translate-y-1 touch-manipulation "; }
                                else seatClasses += "cursor-default border-slate-400 border-b-slate-500 bg-slate-100 opacity-95 "; 
                            } else {
                                seatClasses += "bg-slate-100 border-dashed border-slate-300 hover:border-indigo-400 hover:bg-indigo-50 border-2 transition-colors cursor-pointer"; 
                            }
                        }
                    }

                    seats.push(
                        <div 
                            key={seatId} className={seatClasses} onClick={clickHandler} draggable={draggable} 
                            onDragStart={(e) => { if (draggable && !isLocked) onDragStart(e, studentName, seatId, null); }} 
                            onDragOver={(e) => { if (mode === 'view' && !isUnavailable && !isLocked) onDragOver(e); }} 
                            onDrop={(e) => { if (mode === 'view' && !isUnavailable && !isLocked) onDrop(e, studentName, seatId); }} 
                            title={hasViolation ? violations.join('\n') : (studentName || seatId)}
                        >
                        {mode === 'config' && isUnavailable && !isPrintMode && <Icon name="x" size={20} className="opacity-40 text-slate-700"/>}
                        {studentName && (
                            <>
                                <div className="flex flex-col items-center justify-center w-full h-full pointer-events-none">
                                    <div className="flex items-center justify-center w-full">
                                        {studentNumbers[studentName] && <span className={`${isPrintMode ? 'text-slate-800 text-xs md:text-sm font-semibold mb-0.5' : 'text-slate-500 text-[10px] md:text-[11px] font-bold tracking-wider mb-0.5 bg-white/60 px-1 rounded'}`}>{studentNumbers[studentName]}</span>}
                                    </div>
                                    <span className={`font-black w-full px-0.5 ${isPrintMode ? 'text-black text-sm md:text-lg leading-tight break-words pb-1' : 'leading-snug line-clamp-2 md:mt-0.5 text-[13px] md:text-base'} ${hasViolation && !isPrintMode ? 'text-rose-900' : (!isPrintMode ? 'text-slate-800' : '')}`}>{studentName}</span>
                                </div>
                                {draggable && !isPrintMode && <Icon name="grip-vertical" size={12} className="absolute bottom-1 right-1 text-slate-300 opacity-40 md:opacity-0 group-hover:opacity-100 transition-opacity" />}
                                {mode === 'view' && !isPrintMode && onToggleLock && (
                                <button onClick={(e) => { e.stopPropagation(); onToggleLock(seatId); }} className={`absolute top-0 left-0 md:top-1 md:left-1 z-20 w-7 h-7 md:w-6 md:h-6 flex items-center justify-center rounded-br-lg md:rounded-full transition-all duration-300 ${isLocked ? 'bg-rose-500 md:border-2 border-rose-600 shadow-[0_0_6px_rgba(225,29,72,0.6)] md:scale-110 text-white' : 'bg-slate-200 border-slate-300 hover:bg-slate-400 hover:border-slate-500 hover:scale-110 opacity-60 md:opacity-0 group-hover:opacity-100 text-slate-500 hover:text-white md:text-transparent'}`} title={isLocked ? "已鎖定 (點擊解除)" : "點擊鎖定此座位"}>
                                    {isLocked ? <Icon name="pin" size={14} className="transform rotate-45"/> : <Icon name="pin" size={12} className="opacity-0 md:opacity-100" />}
                                </button>
                                )}
                            </>
                        )}
                        {!studentName && mode === 'view' && !isUnavailable && !isPrintMode && (
                            <div className="text-[9px] md:text-[10px] text-slate-300 font-bold tracking-wider">{seatId}</div>
                        )}
                        </div>
                    );
                }
            }

            return (
                <div className={`inline-block ${isPrintMode ? 'p-0 w-full' : 'p-1 md:p-2'}`}>
                <Podium />
                <div style={gridStyle}>{seats}</div>
                </div>
            );
        };

        // --- 8. 主程式 (State Management) ---
        const SeatingAppMain = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [currentStep, setCurrentStep] = useState(1);

            const [rows, setRows] = useState(6);
            const [cols, setCols] = useState(7);
            const [frontRowsCount, setFrontRowsCount] = useState(2);
            const [unavailableSeats, setUnavailableSeats] = useState(new Set()); 
            const [rawRosterInput, setRawRosterInput] = useState("");
            const [roster, setRoster] = useState([]); 

            const [fixedAssignments, setFixedAssignments] = useState({}); 
            const [frontRowPriorityStudents, setFrontRowPriorityStudents] = useState(new Set()); 
            const [mustSitTogether, setMustSitTogether] = useState([]); 
            const [cannotSitTogether, setCannotSitTogether] = useState([]); 
            const [studentNumbers, setStudentNumbers] = useState({}); 
            const [studentGenders, setStudentGenders] = useState({});
            const [enableCheckerboard, setEnableCheckerboard] = useState(false);

            const [activeConstraintMode, setActiveConstraintMode] = useState(null); 
            const [activeConstraintStudent, setActiveConstraintStudent] = useState(null); 
            
            const [batchMode, setBatchMode] = useState(null); 
            const [batchSelection, setBatchSelection] = useState(new Set());
            const [editingBatch, setEditingBatch] = useState(null);

            const [showFixedSeatModal, setShowFixedSeatModal] = useState(false);
            const [showResetConfirmModal, setShowResetConfirmModal] = useState(false); 
            const [isPrintMode, setIsPrintMode] = useState(false);

            const [showCloudModal, setShowCloudModal] = useState(false);
            const [cloudMode, setCloudMode] = useState('save'); 
            const [cloudProjects, setCloudProjects] = useState([]);
            const [saveProjectName, setSaveProjectName] = useState("");
            const [isCloudLoading, setIsCloudLoading] = useState(false);
            
            const [isGenerating, setIsGenerating] = useState(false);

            const [seatingChart, setSeatingChart] = useState({}); 
            const [holdingStudents, setHoldingStudents] = useState([]); 
            const [manualViolations, setManualViolations] = useState([]);
            const [seatViolationsMap, setSeatViolationsMap] = useState({}); 
            const [lockedSeats, setLockedSeats] = useState(new Set()); 
            
            const [chartHistory, setChartHistory] = useState([]);
            const [historyIndex, setHistoryIndex] = useState(-1);

            const fileInputRef = useRef(null);

            const handleLoginSuccess = (user) => { setCurrentUser(user); };
            const handleLogout = () => { setCurrentUser(null); localStorage.removeItem('yk_seating_id'); localStorage.removeItem('yk_seating_pin'); resetAppToInitialState(); };

            const resetAppToInitialState = () => {
                setRows(6); setCols(7); setFrontRowsCount(2); setUnavailableSeats(new Set());
                setRawRosterInput(""); setRoster([]);
                setFixedAssignments({}); setFrontRowPriorityStudents(new Set()); setMustSitTogether([]); setCannotSitTogether([]);
                setStudentNumbers({}); setStudentGenders({}); setEnableCheckerboard(false);
                setActiveConstraintMode(null); setActiveConstraintStudent(null); setBatchMode(null); setBatchSelection(new Set()); setEditingBatch(null);
                setSeatingChart({}); setHoldingStudents([]); setManualViolations([]); setSeatViolationsMap({}); setLockedSeats(new Set());
                setChartHistory([]); setHistoryIndex(-1); setShowFixedSeatModal(false); setShowResetConfirmModal(false);
                setCurrentStep(1);
            };

            const totalSeats = rows * cols;
            const availableSeatsList = useMemo(() => {
                const seats = [];
                for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) { const id = getSeatId(r, c); if (!unavailableSeats.has(id)) seats.push({ id, r, c, isFrontRow: r < frontRowsCount }); }
                } return seats;
            }, [rows, cols, frontRowsCount, unavailableSeats]);

            const totalAvailableSeats = availableSeatsList.length;
            const frontAvailableSeats = availableSeatsList.filter(s => s.isFrontRow).length;

            const studentsFixedInFrontRow = useMemo(() => {
                const students = new Set();
                for (const [student, seatId] of Object.entries(fixedAssignments)) {
                    const parsed = parseSeatId(seatId); if (parsed && parsed.r < frontRowsCount && !unavailableSeats.has(seatId)) students.add(student);
                } return students;
            }, [fixedAssignments, frontRowsCount, unavailableSeats]);

            const fixedFrontCount = studentsFixedInFrontRow.size;
            const effectiveFrontAvailableSeats = frontAvailableSeats - fixedFrontCount;

            const prepareProjectData = () => ({
                version: "5.0", 
                name: saveProjectName || `座位表存檔 ${new Date().toLocaleDateString()}`,
                currentStep,
                config: { rows, cols, frontRowsCount, unavailableSeats: Array.from(unavailableSeats), enableCheckerboard },
                rosterData: { rawRosterInput, roster, studentNumbers, studentGenders },
                constraints: { fixedAssignments, frontRowPriorityStudents: Array.from(frontRowPriorityStudents), mustSitTogether: mustSitTogether.map(g => JSON.stringify(g)), cannotSitTogether: cannotSitTogether.map(p => JSON.stringify(p)) },
                results: { seatingChart, holdingStudents, lockedSeats: Array.from(lockedSeats) }
            });

            const openCloudManager = async () => {
                setCloudMode('save'); setSaveProjectName(`班級座位表 ${new Date().toLocaleDateString()}`);
                setShowCloudModal(true); await fetchCloudProjects(); 
            };

            const handleCloudSave = async () => {
                if (!saveProjectName.trim()) return;
                const existingProject = cloudProjects.find(p => p.name === saveProjectName.trim());
                if (existingProject) { if (!window.confirm(`雲端已存在名為「${saveProjectName}」的存檔。\n您確定要覆蓋它嗎？`)) return; }
                setIsCloudLoading(true);
                try {
                    const payload = { action: 'save', id: existingProject ? existingProject.id : null, projectName: saveProjectName.trim(), projectData: prepareProjectData(), timestamp: new Date().toISOString(), teacherId: currentUser.id, pin: currentUser.pin };
                    const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.success) setShowCloudModal(false); else alert("儲存失敗：" + (result.error || "權限不足"));
                } catch (error) { alert("連線失敗，請檢查網路狀態。"); } finally { setIsCloudLoading(false); }
            };

            const fetchCloudProjects = async () => {
                setIsCloudLoading(true);
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getData&teacherId=${currentUser.id}&pin=${currentUser.pin}&t=${Date.now()}`);
                    const data = await res.json();
                    if(data.error) { alert(data.error); handleLogout(); return; }
                    if (Array.isArray(data)) setCloudProjects(data);
                } catch (error) { console.error("Fetch failed", error); } finally { setIsCloudLoading(false); }
            };

            const handleDeleteProject = async (docId) => {
                if (!window.confirm("確定要刪除此存檔嗎？此操作無法復原。")) return;
                setIsCloudLoading(true);
                try {
                    const payload = { action: 'delete', id: docId, teacherId: currentUser.id, pin: currentUser.pin };
                    const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.success) await fetchCloudProjects(); else alert(result.error);
                } catch (error) { console.error("Delete failed", error); } finally { setIsCloudLoading(false); }
            };

            const handleLoadProject = (data) => {
                try {
                setRows(data.config.rows); setCols(data.config.cols); setFrontRowsCount(data.config.frontRowsCount);
                setUnavailableSeats(new Set(data.config.unavailableSeats)); setEnableCheckerboard(!!data.config.enableCheckerboard);
                setRawRosterInput(data.rosterData.rawRosterInput); setRoster(data.rosterData.roster);
                setStudentNumbers(data.rosterData.studentNumbers || {}); setStudentGenders(data.rosterData.studentGenders || {});
                setFixedAssignments(data.constraints.fixedAssignments || {}); setFrontRowPriorityStudents(new Set(data.constraints.frontRowPriorityStudents || []));
                setMustSitTogether((data.constraints.mustSitTogether || []).map(g => typeof g === 'string' ? JSON.parse(g) : g));
                setCannotSitTogether((data.constraints.cannotSitTogether || []).map(p => typeof p === 'string' ? JSON.parse(p) : p));
                
                if (data.results?.seatingChart) {
                    setSeatingChart(data.results.seatingChart); setHoldingStudents(data.results.holdingStudents || []); setLockedSeats(new Set(data.results.lockedSeats || []));
                    setChartHistory([{ chart: data.results.seatingChart, holding: data.results.holdingStudents || [] }]); setHistoryIndex(0); validateSeating(data.results.seatingChart);
                }
                setCurrentStep(data.currentStep || 1); setShowCloudModal(false);
                } catch (err) { alert("載入失敗：檔案格式錯誤。"); }
            };

            const handleFileDownload = () => {
                const projectData = prepareProjectData(); const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectData));
                const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", `${projectData.name}.json`);
                document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
                reader.onload = (e) => { try { handleLoadProject(JSON.parse(e.target.result)); } catch (err) { alert("載入失敗：檔案格式錯誤。"); } };
                reader.readAsText(file); event.target.value = null;
            };

            const toggleUnavailableSeat = (r, c) => { const id = getSeatId(r, c); setUnavailableSeats(prev => { const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next; }); };

            const parseAndValidateRoster = () => {
                const lines = rawRosterInput.split('\n').filter(line => line.trim().length > 0);
                const newRoster = []; const newNumbers = { ...studentNumbers }; const newGenders = { ...studentGenders };

                lines.forEach(line => {
                    let name = line.trim(); let num = null; let gender = null;
                    const genderMatch = name.match(/\s*(男|女|[MFmf])\s*$/);
                    if(genderMatch) { 
                        let gRaw = genderMatch[1].toUpperCase(); 
                        gender = (gRaw === '男' || gRaw === 'M') ? 'M' : 'F'; 
                        name = name.replace(/\s*(男|女|[MFmf])\s*$/, '').trim(); 
                    }
                    const numMatch = name.match(/^(\d+)[.、\s]*/);
                    if (numMatch) { num = numMatch[1]; name = name.replace(/^(\d+)[.、\s]*/, '').trim(); }
                    name = name.replace(/[,;\t()（）]/g, '').trim();

                    if (name && !newRoster.includes(name)) { newRoster.push(name); if (num) newNumbers[name] = num; if (gender) newGenders[name] = gender; }
                });

                setRoster(newRoster); setStudentNumbers(newNumbers); setStudentGenders(newGenders);

                const newRosterSet = new Set(newRoster);
                const nextFixed = { ...fixedAssignments }; Object.keys(nextFixed).forEach(name => { if (!newRosterSet.has(name)) delete nextFixed[name]; });
                setFixedAssignments(nextFixed);
                setFrontRowPriorityStudents(prev => new Set([...prev].filter(n => newRosterSet.has(n))));
                setMustSitTogether(prev => prev.map(group => group.filter(n => newRosterSet.has(n))).filter(group => group.length >= 2));
                setCannotSitTogether(prev => prev.map(pair => pair.filter(n => newRosterSet.has(n))).filter(pair => pair.length === 2));
                return true;
            };

            const goToStep2 = () => { if (parseAndValidateRoster()) setCurrentStep(2); };

            const toggleFrontRowPriority = (student) => {
                const assignedSeat = fixedAssignments[student];
                if (assignedSeat) {
                    const parsed = parseSeatId(assignedSeat);
                    if (parsed && parsed.r >= frontRowsCount && !unavailableSeats.has(assignedSeat)) { alert(`【操作無效】${student} 已被指定在後排座位，無法設為前排優先。\n請先解除指定座位。`); return;
                    }
                }
                setFrontRowPriorityStudents(prev => { const next = new Set(prev); if (next.has(student)) next.delete(student); else next.add(student); return next; });
            };

            const startConstraintMode = (mode, student) => {
                if (activeConstraintMode === mode && activeConstraintStudent === student) { setActiveConstraintMode(null); setActiveConstraintStudent(null); return; }
                setActiveConstraintMode(mode); setActiveConstraintStudent(student);
            };

            const applyConstraintPair = (targetStudent) => {
                if (!activeConstraintMode || !activeConstraintStudent || activeConstraintStudent === targetStudent) { startConstraintMode(activeConstraintMode, targetStudent); return; }
                if (activeConstraintMode === 'MUST_SIT') {
                    if (cannotSitTogether.some(p => (p.includes(activeConstraintStudent) && p.includes(targetStudent)))) { alert(`${activeConstraintStudent} 和 ${targetStudent} 已設定為「禁止相鄰」。`); setActiveConstraintMode(null); setActiveConstraintStudent(null); return; }
                    let newGroups = [...mustSitTogether]; let sIdx = newGroups.findIndex(g => g.includes(activeConstraintStudent)); let tIdx = newGroups.findIndex(g => g.includes(targetStudent));
                    if (sIdx !== -1 && tIdx !== -1) { if (sIdx !== tIdx) { const merged = [...new Set([...newGroups[sIdx], ...newGroups[tIdx]])]; newGroups = newGroups.filter((_, idx) => idx !== sIdx && idx !== tIdx); newGroups.push(merged); } } 
                    else if (sIdx !== -1) newGroups[sIdx] = [...new Set([...newGroups[sIdx], targetStudent])];
                    else if (tIdx !== -1) newGroups[tIdx] = [...new Set([...newGroups[tIdx], activeConstraintStudent])];
                    else newGroups.push([activeConstraintStudent, targetStudent]);
                    setMustSitTogether(newGroups);
                } else if (activeConstraintMode === 'CANNOT_SIT') {
                    if (mustSitTogether.some(g => g.includes(activeConstraintStudent) && g.includes(targetStudent))) { alert(`${activeConstraintStudent} 和 ${targetStudent} 已設定為「必須相鄰」。`); setActiveConstraintMode(null); setActiveConstraintStudent(null); return; }
                    if (!cannotSitTogether.some(p => p.includes(activeConstraintStudent) && p.includes(targetStudent))) setCannotSitTogether(prev => [...prev, [activeConstraintStudent, targetStudent]]);
                }
                setActiveConstraintMode(null); setActiveConstraintStudent(null);
            };

            const startBatchMode = (mode) => { if(enableCheckerboard) return; setActiveConstraintMode(null); setActiveConstraintStudent(null); setBatchMode(mode); setBatchSelection(new Set()); setEditingBatch(null); };
            const toggleBatchSelection = (student) => { setBatchSelection(prev => { const next = new Set(prev); if (next.has(student)) next.delete(student); else next.add(student); return next; }); };
            
            const editGroup = (type, index, members) => {
                if (enableCheckerboard) return;
                setActiveConstraintMode(null);
                setActiveConstraintStudent(null);
                setEditingBatch({ type, index });
                setBatchSelection(new Set(members));
                setBatchMode(type);
            };

            const applyBatchMode = () => {
                const arr = Array.from(batchSelection);
                if (batchMode === 'MUST_SIT') {
                    setMustSitTogether(prev => {
                        let newGroups = [...prev];
                        if (editingBatch && editingBatch.type === 'MUST_SIT') {
                            newGroups = newGroups.filter((_, i) => i !== editingBatch.index);
                        }
                        let mergedSet = new Set(arr);
                        newGroups = newGroups.filter(g => {
                            if (g.some(s => mergedSet.has(s))) {
                                g.forEach(s => mergedSet.add(s));
                                return false; 
                            }
                            return true;
                        });
                        if (mergedSet.size >= 2) newGroups.push(Array.from(mergedSet));
                        return newGroups;
                    });
                } else if (batchMode === 'CANNOT_SIT') { 
                    setCannotSitTogether(prev => {
                        let newPairs = [...prev];
                        if (editingBatch && editingBatch.type === 'CANNOT_SIT') {
                            newPairs = newPairs.filter((_, i) => i !== editingBatch.index);
                        }
                        for(let i=0; i<arr.length; i++) { 
                            for(let j=i+1; j<arr.length; j++) newPairs.push([arr[i], arr[j]]); 
                        } 
                        const uniquePairs = [];
                        const seen = new Set();
                        newPairs.forEach(p => {
                            const key = p.slice().sort().join('|');
                            if (!seen.has(key)) { seen.add(key); uniquePairs.push(p); }
                        });
                        return uniquePairs;
                    }); 
                }
                setBatchMode(null); setBatchSelection(new Set()); setEditingBatch(null);
            };
            const cancelBatchMode = () => { setBatchMode(null); setBatchSelection(new Set()); setEditingBatch(null); };

            const handleRemoveFromMustGroup = (groupIndex, student) => {
                setMustSitTogether(prev => {
                    const next = [...prev];
                    next[groupIndex] = next[groupIndex].filter(s => s !== student);
                    if (next[groupIndex].length < 2) next.splice(groupIndex, 1);
                    return next;
                });
            };
            const handleDeleteMustGroup = (groupIndex) => setMustSitTogether(prev => prev.filter((_, i) => i !== groupIndex));
            const handleDeleteCannotPair = (pairIndex) => setCannotSitTogether(prev => prev.filter((_, i) => i !== pairIndex));

            const removeStudentFromMustSit = (student) => setMustSitTogether(prev => prev.map(g => g.filter(s => s !== student)).filter(g => g.length >= 2));
            const removeStudentFromCannotSit = (student) => setCannotSitTogether(prev => prev.filter(p => !p.includes(student)));
            const clearAllStudentConstraints = (student) => {
                setFixedAssignments(prev => { const next = {...prev}; delete next[student]; return next; });
                setFrontRowPriorityStudents(prev => { const next = new Set(prev); next.delete(student); return next; });
                setMustSitTogether(prev => prev.map(g => g.filter(s => s !== student)).filter(g => g.length >= 2));
                setCannotSitTogether(prev => prev.filter(p => !p.includes(student)));
            };
            const openFixedSeatModal = (student) => { setActiveConstraintStudent(student); setShowFixedSeatModal(true); };
            const clearFixedAssignment = (student) => setFixedAssignments(prev => { const next = { ...prev }; delete next[student]; return next; });
            const handleFixedSeatSelect = (seatId) => {
                if (!activeConstraintStudent) return;
                if (frontRowPriorityStudents.has(activeConstraintStudent)) {
                    const parsed = parseSeatId(seatId); if (parsed && parsed.r >= frontRowsCount) { alert(`【操作無效】${activeConstraintStudent} 已設為「前排優先」，無法指定至後排座位。\n請先取消其前排設定。`); return; }
                }
                setFixedAssignments(prev => ({ ...prev, [activeConstraintStudent]: seatId })); setShowFixedSeatModal(false); setActiveConstraintStudent(null);
            };
            const resetAllConstraints = () => { if (window.confirm("確定要清除所有學生約束設定嗎？")) { setFixedAssignments({}); setFrontRowPriorityStudents(new Set()); setMustSitTogether([]); setCannotSitTogether([]); } };

            const tryPlaceUnit = (unit, candidateSeats, chart, finalUsedSeats, cols) => {
                if (!unit.isGroup) { for (const s of candidateSeats) { chart[s.id] = unit.members[0]; finalUsedSeats.add(s.id); return true; } } 
                else {
                    for (const s of candidateSeats) {
                        const adjSeats = candidateSeats.filter(cand => cand.id !== s.id && isStrictAdjacent(s.id, cand.id));
                        if (adjSeats.length >= unit.members.length - 1) {
                            chart[s.id] = unit.members[0]; finalUsedSeats.add(s.id);
                            for (let i = 1; i < unit.members.length; i++) { chart[adjSeats[i - 1].id] = unit.members[i]; finalUsedSeats.add(adjSeats[i - 1].id); }
                            return true;
                        }
                    }
                } return false;
            };

            const runSingleGenerationPass = (effectiveFixed) => {
                const chart = {}; const assignedStudents = new Set(); const usedSeats = new Set(unavailableSeats); 

                for (const [student, seatId] of Object.entries(effectiveFixed)) {
                    if (roster.includes(student) && !unavailableSeats.has(seatId) && !chart[seatId]) { chart[seatId] = student; assignedStudents.add(student); usedSeats.add(seatId); }
                }

                let remainingStudents = roster.filter(s => !assignedStudents.has(s));
                let placementUnits = []; const processedForUnits = new Set();
                const effectiveMustSit = enableCheckerboard ? [] : mustSitTogether;

                for (const group of effectiveMustSit) {
                    const unassigned = group.filter(s => !assignedStudents.has(s));
                    if (unassigned.length > 0 && !unassigned.some(s => processedForUnits.has(s))) {
                        placementUnits.push({ members: unassigned, isGroup: true, isFrontPriority: unassigned.some(s => frontRowPriorityStudents.has(s)) }); unassigned.forEach(s => processedForUnits.add(s));
                    }
                }
                for (const student of remainingStudents) {
                    if (!processedForUnits.has(student)) { placementUnits.push({ members: [student], isGroup: false, isFrontPriority: frontRowPriorityStudents.has(student) }); processedForUnits.add(student); }
                }

                let frontUnits = placementUnits.filter(u => u.isFrontPriority).sort((a,b) => b.members.length - a.members.length);
                let nonFrontGroupUnits = placementUnits.filter(u => !u.isFrontPriority && u.isGroup).sort((a,b) => b.members.length - a.members.length);
                let individuals = placementUnits.filter(u => !u.isFrontPriority && !u.isGroup); shuffleArray(individuals); 

                const finalPlacementUnits = [...frontUnits, ...nonFrontGroupUnits, ...individuals];

                let availableSeatsSeq = [];
                for (let r = 0; r < rows; r++) { for (let c = 0; c < cols; c++) { const id = getSeatId(r, c); if (!usedSeats.has(id)) availableSeatsSeq.push({ id, r, c, isFrontRow: r < frontRowsCount }); } }

                const finalUsedSeats = new Set(usedSeats); const unplaced = [];

                for (const unit of finalPlacementUnits) {
                    let placed = false; let candidateSeats = availableSeatsSeq.filter(s => !finalUsedSeats.has(s.id)); shuffleArray(candidateSeats); 
                    if (unit.isFrontPriority) { let frontCandidates = candidateSeats.filter(s => s.isFrontRow); if (tryPlaceUnit(unit, frontCandidates, chart, finalUsedSeats, cols)) placed = true; }
                    if (!placed) { if (tryPlaceUnit(unit, candidateSeats, chart, finalUsedSeats, cols)) placed = true; }
                    
                    if (!placed && unit.isGroup) {
                        for (const member of unit.members) {
                            let memberPlaced = false; let singleCandidates = availableSeatsSeq.filter(s => !finalUsedSeats.has(s.id)); shuffleArray(singleCandidates);
                            for (const s of singleCandidates) { chart[s.id] = member; finalUsedSeats.add(s.id); memberPlaced = true; break; }
                            if (!memberPlaced) unplaced.push(member);
                        } placed = true;
                    }
                    if (!placed) unplaced.push(...unit.members);
                }
                return { chart, unplaced, availableSeatsSeq }; 
            };

            const calculatePenalty = useCallback((chart, unplaced) => {
                let penalty = unplaced.length * 100000; const centerC = (cols - 1) / 2;
                
                const studentToSeat = {};
                for (const seatId in chart) studentToSeat[chart[seatId]] = seatId;

                frontRowPriorityStudents.forEach(student => {
                    const seatId = studentToSeat[student];
                    if (seatId) { const parsed = parseSeatId(seatId); if (parsed.r >= frontRowsCount) penalty += 5000; else penalty += Math.abs(parsed.c - centerC) * 10; }
                });

                if (enableCheckerboard) {
                    Object.entries(chart).forEach(([seatId, student]) => {
                        const g1 = studentGenders[student];
                        if (g1) {
                            const parsed = parseSeatId(seatId); const right = getSeatId(parsed.r, parsed.c + 1); const down = getSeatId(parsed.r + 1, parsed.c);
                            [right, down].forEach(adjId => { if (chart[adjId] && !unavailableSeats.has(adjId)) { const g2 = studentGenders[chart[adjId]]; if (g2 && g1 === g2) penalty += 30000; } });
                        }
                    });
                } else {
                    mustSitTogether.forEach(group => {
                        const seats = group.map(s => studentToSeat[s]).filter(Boolean);
                        if (seats.length < group.length) penalty += 20000;
                        else { 
                            seats.forEach(s1 => { if (!seats.some(s2 => s1 !== s2 && isStrictAdjacent(s1, s2)) && group.length > 1) penalty += 8000; }); 
                        }
                    });
                    cannotSitTogether.forEach(pair => {
                        const s1 = studentToSeat[pair[0]]; const s2 = studentToSeat[pair[1]];
                        if (s1 && s2 && isStrictAdjacent(s1, s2)) penalty += 10000; 
                    });
                }
                return penalty;
            }, [cols, frontRowsCount, frontRowPriorityStudents, mustSitTogether, cannotSitTogether, enableCheckerboard, studentGenders, unavailableSeats]);

            const generateSeatingChart = (keepLocked = false) => {
                try {
                    let bestChart = null; let bestScore = Infinity; let bestUnplaced = [];
                    const effectiveFixed = { ...fixedAssignments };
                    if (keepLocked) { lockedSeats.forEach(seatId => { if (seatingChart[seatId]) effectiveFixed[seatingChart[seatId]] = seatId; }); }

                    for (let iter = 0; iter < 50; iter++) {
                        const { chart, unplaced, availableSeatsSeq } = runSingleGenerationPass(effectiveFixed);
                        let currentPenalty = calculatePenalty(chart, unplaced); let improved = true; let loops = 0;

                        const movableSeats = availableSeatsSeq.map(s => s.id).filter(id => !Object.values(effectiveFixed).includes(id));

                        while (improved && loops < 30) { 
                            improved = false; loops++;
                            for (let i = 0; i < movableSeats.length; i++) {
                                for (let j = i + 1; j < movableSeats.length; j++) {
                                    const s1 = movableSeats[i]; const s2 = movableSeats[j];
                                    const temp1 = chart[s1]; const temp2 = chart[s2];
                                    if (!temp1 && !temp2) continue;
                                    
                                    if (temp2) chart[s1] = temp2; else delete chart[s1];
                                    if (temp1) chart[s2] = temp1; else delete chart[s2];
                                    
                                    const newPenalty = calculatePenalty(chart, unplaced);
                                    if (newPenalty < currentPenalty) { currentPenalty = newPenalty; improved = true; } 
                                    else { if (temp1) chart[s1] = temp1; else delete chart[s1]; if (temp2) chart[s2] = temp2; else delete chart[s2]; }
                                }
                            }
                        }
                        if (currentPenalty < bestScore) { bestScore = currentPenalty; bestChart = { ...chart }; bestUnplaced = [...unplaced]; }
                        if (bestScore === 0) break; 
                    }

                    if (keepLocked) {
                        handleUpdateChartAndHolding(bestChart, bestUnplaced);
                    } else {
                        setSeatingChart(bestChart); setHoldingStudents(bestUnplaced);
                        setChartHistory([{ chart: bestChart, holding: bestUnplaced }]); setHistoryIndex(0);
                        setCurrentStep(3); validateSeating(bestChart); 
                    }
                } catch (e) {
                    console.error(e);
                    alert("座位生成發生錯誤，請重試。");
                }
            };
            
            const handleGenerateTrigger = (keepLocked = false) => { setIsGenerating(true); setTimeout(() => { generateSeatingChart(keepLocked); setIsGenerating(false); }, 50); }

            const validateSeatingPure = useCallback((chart) => {
                const violations = []; const seatMap = {}; 
                const markViolation = (seatId, msg) => { if (!seatId) return; if (!seatMap[seatId]) seatMap[seatId] = []; seatMap[seatId].push(msg); violations.push(msg); };

                const studentToSeat = {};
                for (const seatId in chart) studentToSeat[chart[seatId]] = seatId;

                for (const student of frontRowPriorityStudents) {
                    const seatId = studentToSeat[student];
                    if (seatId && parseSeatId(seatId).r >= frontRowsCount) markViolation(seatId, `【前排優先】應坐前排`);
                }

                for (const [student, requiredSeatId] of Object.entries(fixedAssignments)) {
                    const currentSeatId = studentToSeat[student];
                    if (currentSeatId && currentSeatId !== requiredSeatId) markViolation(currentSeatId, `【指定座位】應坐於 ${requiredSeatId}`);
                }

                if (enableCheckerboard) {
                    Object.entries(chart).forEach(([seatId, student]) => {
                        const g1 = studentGenders[student];
                        if (g1) {
                            const parsed = parseSeatId(seatId); const right = getSeatId(parsed.r, parsed.c + 1); const down = getSeatId(parsed.r + 1, parsed.c);
                            [right, down].forEach(adjId => { if (chart[adjId] && !unavailableSeats.has(adjId)) { const g2 = studentGenders[chart[adjId]]; if (g2 && g1 === g2) { markViolation(seatId, `【梅花座衝突】同性相鄰`); markViolation(adjId, `【梅花座衝突】同性相鄰`); } } });
                        }
                    });
                } else {
                    mustSitTogether.forEach(group => {
                        const memberSeats = group.map(s => ({ name: s, seat: studentToSeat[s] })).filter(o => o.seat);
                        if (memberSeats.length < group.length) violations.push(`【必須相鄰】[${group.join(', ')}] 有成員在暫存區`);
                        else { 
                            memberSeats.forEach(ms => { 
                                const hasAdj = memberSeats.some(other => other.name !== ms.name && isStrictAdjacent(ms.seat, other.seat)); 
                                if (!hasAdj && group.length > 1) markViolation(ms.seat, `【同桌互助】未與群組相鄰(前後左右)`); 
                            }); 
                        }
                    });
                    cannotSitTogether.forEach(pair => {
                        const seat1 = studentToSeat[pair[0]]; const seat2 = studentToSeat[pair[1]];
                        if (seat1 && seat2 && isStrictAdjacent(seat1, seat2)) { markViolation(seat1, `【禁止相鄰】緊鄰 ${pair[1]}`); markViolation(seat2, `【禁止相鄰】緊鄰 ${pair[0]}`); }
                    });
                }
                return { violations, seatMap };
            }, [cols, frontRowsCount, frontRowPriorityStudents, fixedAssignments, mustSitTogether, cannotSitTogether, enableCheckerboard, studentGenders, unavailableSeats]);

            const validateSeating = useCallback((chart) => { const { violations, seatMap } = validateSeatingPure(chart); setManualViolations([...new Set(violations)]); setSeatViolationsMap(seatMap); }, [validateSeatingPure]);

            const handleUpdateChartAndHolding = (newChart, newHolding) => {
                const newHistory = chartHistory.slice(0, historyIndex + 1); newHistory.push({ chart: newChart, holding: newHolding });
                setChartHistory(newHistory); setHistoryIndex(newHistory.length - 1); setSeatingChart(newChart); setHoldingStudents(newHolding); validateSeating(newChart);
            };

            const undo = () => { if (historyIndex > 0) { const prevState = chartHistory[historyIndex - 1]; setHistoryIndex(historyIndex - 1); setSeatingChart(prevState.chart); setHoldingStudents(prevState.holding); validateSeating(prevState.chart); } };
            const redo = () => { if (historyIndex < chartHistory.length - 1) { const nextState = chartHistory[historyIndex + 1]; setHistoryIndex(historyIndex + 1); setSeatingChart(nextState.chart); setHoldingStudents(nextState.holding); validateSeating(nextState.chart); } };

            const handleDragStart = (e, student, seatId, idx) => { const source = seatId ? 'seat' : 'holding'; e.dataTransfer.setData("application/json", JSON.stringify({ source, student, seatId, idx })); e.dataTransfer.effectAllowed = "move"; };

            const handleSeatDrop = (e, targetStudent, targetSeatId) => {
                e.preventDefault(); if (lockedSeats.has(targetSeatId)) return;
                try {
                    const data = JSON.parse(e.dataTransfer.getData("application/json"));
                    if (data.source === 'seat' && lockedSeats.has(data.seatId)) return;
                    if (!data.student || (data.source === 'seat' && data.seatId === targetSeatId)) return;

                    const newChart = { ...seatingChart }; let newHolding = [...holdingStudents];
                    if (data.source === 'holding') { newChart[targetSeatId] = data.student; newHolding.splice(data.idx, 1); if (targetStudent) newHolding.push(targetStudent); } 
                    else if (data.source === 'seat') { if (!targetStudent) { delete newChart[data.seatId]; newChart[targetSeatId] = data.student; } else { newChart[data.seatId] = targetStudent; newChart[targetSeatId] = data.student; } }

                    const oldV = validateSeatingPure(seatingChart).violations.length; const newV = validateSeatingPure(newChart).violations.length;
                    if (newV > oldV) { if (!window.confirm("此交換將產生新的違規衝突，確定要強制放置嗎？")) return; }
                    handleUpdateChartAndHolding(newChart, newHolding);
                } catch (err) {}
            };

            const handleHoldingZoneDrop = (e) => {
                e.preventDefault();
                try {
                    const data = JSON.parse(e.dataTransfer.getData("application/json"));
                    if (data.source !== 'seat') return; if (lockedSeats.has(data.seatId)) return;
                    
                    const newChart = { ...seatingChart }; const student = newChart[data.seatId]; delete newChart[data.seatId];
                    const newHolding = [...holdingStudents, student]; handleUpdateChartAndHolding(newChart, newHolding);
                } catch(err){}
            };

            const handleToggleLock = (seatId) => { setLockedSeats(prev => { const next = new Set(prev); if (next.has(seatId)) next.delete(seatId); else next.add(seatId); return next; }); };

                        <div className="flex items-center justify-between sm:justify-start gap-3 w-full sm:w-auto bg-indigo-50/50 p-2 sm:p-1.5 sm:pl-4 rounded-xl border border-indigo-100">

                    {currentStep === 2 && <Step2Constraints roster={roster} fixedAssignments={fixedAssignments} frontRowPriorityStudents={frontRowPriorityStudents} mustSitTogether={mustSitTogether} cannotSitTogether={cannotSitTogether} studentNumbers={studentNumbers} studentGenders={studentGenders} enableCheckerboard={enableCheckerboard} toggleFrontRowPriority={toggleFrontRowPriority} activeConstraintMode={activeConstraintMode} activeConstraintStudent={activeConstraintStudent} startConstraintMode={startConstraintMode} applyConstraintPair={applyConstraintPair} openFixedSeatModal={openFixedSeatModal} clearFixedAssignment={clearFixedAssignment} clearAllStudentConstraints={clearAllStudentConstraints} removeStudentFromMustSit={removeStudentFromMustSit} removeStudentFromCannotSit={removeStudentFromCannotSit} isInMustSitGroup={student => mustSitTogether.some(g => g.includes(student))} isInCannotSitPair={student => cannotSitTogether.some(p => p.includes(student))} getMustSitPartners={student => mustSitTogether.find(g => g.includes(student))?.filter(s => s !== student) || []} getCannotSitPartners={student => cannotSitTogether.filter(p => p.includes(student)).map(p => p.find(s => s !== student))} onPrev={() => setCurrentStep(1)} onGenerate={() => handleGenerateTrigger(false)} isGenerating={isGenerating} resetAllConstraints={resetAllConstraints} totalAvailableSeats={totalAvailableSeats} frontAvailableSeats={frontAvailableSeats} frontRowsCount={frontRowsCount} fixedFrontCount={fixedFrontCount} effectiveFrontAvailableSeats={effectiveFrontAvailableSeats} unavailableSeats={unavailableSeats} batchMode={batchMode} startBatchMode={startBatchMode} batchSelection={batchSelection} toggleBatchSelection={toggleBatchSelection} applyBatchMode={applyBatchMode} cancelBatchMode={cancelBatchMode} handleRemoveFromMustGroup={handleRemoveFromMustGroup} handleDeleteMustGroup={handleDeleteMustGroup} handleDeleteCannotPair={handleDeleteCannotPair} editingBatch={editingBatch} editGroup={editGroup} />}
                    {currentStep === 3 && <Step3Results fixedAssignments={fixedAssignments} rows={rows} cols={cols} frontRowsCount={frontRowsCount} unavailableSeats={unavailableSeats} seatingChart={seatingChart} holdingStudents={holdingStudents} manualViolations={manualViolations} seatViolationsMap={seatViolationsMap} studentNumbers={studentNumbers} lockedSeats={lockedSeats} handleToggleLock={handleToggleLock} handleDragStart={handleDragStart} handleDragOver={e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; }} handleSeatDrop={handleSeatDrop} handleHoldingZoneDrop={handleHoldingZoneDrop} historyIndex={historyIndex} historyLength={chartHistory.length} undo={undo} redo={redo} onPrev={() => setCurrentStep(2)} onReset={() => setShowResetConfirmModal(true)} onGenerateLocked={() => handleGenerateTrigger(true)} isPrintMode={isPrintMode} setIsPrintMode={setIsPrintMode} isGenerating={isGenerating} />}

                        </div>
                    </div>

                        </div>
                        </div>
                    </div>
                    )}

                    {showCloudModal && (

                                <button onClick={async () => { setCloudMode('load'); await fetchCloudProjects(); }} className={`flex-1 py-3 md:py-4 text-xs md:text-sm font-bold flex items-center justify-center gap-1.5 md:gap-2 transition-colors ${cloudMode === 'load' ? 'bg-white text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}><Icon name="upload" size={16}/> 載入</button>
                                <button onClick={() => setShowCloudModal(false)} className="px-3 md:px-4 text-slate-400 hover:text-slate-600 bg-slate-50 hover:bg-slate-100 transition-colors"><Icon name="x" size={18}/></button>
                            </div>

                            <div className="p-4 md:p-6 overflow-y-auto custom-scrollbar flex-grow">
                            {cloudMode === 'save' && (
                                <div className="space-y-4 md:space-y-5">
                                    <div className="bg-indigo-50 p-3 md:p-4 rounded-xl flex items-start gap-2 md:gap-3 text-indigo-800 border border-indigo-100 shadow-sm">
                                    <Icon name="database" size={18} className="flex-shrink-0 mt-0.5" /> 
                                    <div>
                                        <p className="font-bold mb-1 text-sm md:text-base">安全同步至您的專屬資料庫</p>
                                        <p className="opacity-90 leading-relaxed font-medium text-xs md:text-sm">座位表將保存在雲端，僅您本人憑帳號密碼可讀取。</p>
                                    </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-bold text-slate-700 mb-1.5 md:mb-2 ml-1">請為此座位表命名</label>
                                        <input type="text" value={saveProjectName} onChange={(e) => setSaveProjectName(e.target.value)} className="w-full p-3 md:p-3.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all bg-slate-50 focus:bg-white font-semibold text-base md:text-sm" placeholder="例如：七年三班 第一次段考" />
                                    </div>

                                        {isCloudLoading ? <Icon name="loader" className="animate-spin" size={18}/> : <Icon name="save" size={18} />} 確認儲存
                                    </button>
                                </div>
                            )}

                            {cloudMode === 'load' && (
                                <div className="space-y-3 md:space-y-4 min-h-[200px] md:min-h-[250px]">

                                        <div className="text-center py-12 md:py-16 text-slate-400"><Icon name="cloud-off" size={40} className="mx-auto mb-3 md:mb-4 opacity-30"/> <p className="font-bold text-sm">目前沒有雲端存檔。</p></div>

                                        {cloudProjects.map((p, idx) => (
                                            <div key={p.id || idx} className="p-3 md:p-4 border border-slate-200 rounded-xl hover:border-indigo-300 hover:shadow-md transition-all flex justify-between items-center group cursor-pointer bg-white" onClick={() => handleLoadProject(p.data)}>

                                                    <div className="font-extrabold text-slate-800 text-sm md:text-lg mb-0.5 md:mb-1 group-hover:text-indigo-600 transition-colors">{p.name || '未命名專案'}</div>

                                            </div>
                                        ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            <div className="border-t border-slate-100 pt-4 md:pt-6 mt-4 md:mt-6">
                                <div className="flex items-center gap-3 md:gap-4 mb-3 md:mb-4">

                                    <div className="h-px bg-slate-200 flex-grow"></div>
                                </div>
                                <div className="grid grid-cols-2 gap-2 md:gap-3">

                                    <label className="py-2.5 border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl flex justify-center items-center gap-1.5 md:gap-2 text-xs md:text-sm font-bold cursor-pointer transition shadow-sm">

                                        <input type="file" accept=".json" className="hidden" onChange={handleFileUpload} ref={fileInputRef} />

                            </div>
                            
                            </div>
                            <div className="p-3 md:p-4 border-t border-slate-100 bg-slate-50 shrink-0">

            );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SeatingAppMain />);
